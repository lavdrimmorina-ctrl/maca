<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Love Quest 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Calendar Screen -->
    <div id="calendar-screen" class="screen active">
      <h1 class="title">Daily Love Quest</h1>
      <p class="subtitle">One heart a day until forever</p>
      <div id="calendar-grid"></div>
      <div id="progress-bar-container">
        <div id="progress-fill"></div>
      </div>
      <p id="progress-text">0 / 0 days completed</p>
    </div>

    <!-- Level Screen -->
    <div id="level-screen" class="screen">
      <div id="level-header">
        <button id="back-btn">← Calendar</button>
        <span id="level-date-display"></span>
      </div>
      <div id="level-content"></div>
    </div>

    <!-- Proposal Overlay (final day) -->
    <div id="proposal-overlay" class="overlay">
      <h1>Will you marry me?</h1>
      <div class="buttons">
        <button id="yes-btn" class="big-yes">YES! 💍</button>
        <button id="no-btn" class="small-no">No</button>
      </div>
      <div id="confetti"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
