<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Notification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Fake virus alert overlay -->
  <div id="virus-alert" class="overlay show">
    <div class="alert-box">
      <h2>⚠️ CRITICAL SYSTEM ALERT</h2>
      <p>Love virus detected. Click to quarantine.</p>
      <button id="quarantine-btn">Quarantine Now</button>
    </div>
  </div>

  <!-- Fake progress bar overlay -->
  <div id="progress-overlay" class="overlay">
    <div class="progress-container">
      <div id="progress-bar"></div>
      <p id="progress-text"></p>
    </div>
  </div>

  <!-- Memory game overlay -->
  <div id="game-overlay" class="overlay">
    <h2>Prove you're human... or in love ❤️</h2>
    <div id="game-board"></div>
    <p id="game-message"></p>
  </div>

  <!-- Final proposal overlay -->
  <div id="proposal-overlay" class="overlay">
    <h1>Will you marry me?</h1>
    <div class="buttons">
      <button id="yes-btn" class="big-yes">YES! 💍</button>
      <button id="no-btn" class="small-no">No</button>
    </div>
    <div id="confetti"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
